name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Run clippy (deny warnings)
        run: cargo clippy --all-features --tests -- -D warnings
      - name: Run tests
        run: cargo test --all-features

  msrv:
    name: MSRV (Rust 1.83)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust 1.83
        uses: dtolnay/rust-toolchain@1.83
      - name: Check build with MSRV
        run: cargo check --all-features

  python_integration:
    name: Python integration test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install maturin
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install maturin
      - name: Build and install Python bindings
        run: |
          . .venv/bin/activate
          maturin develop --features python
      - name: Run Python smoke test
        run: |
          . .venv/bin/activate
          python -c "import undocx; print('Python binding OK')"

  # Ensure release tags point to commits already merged into main.
  release_guard:
    name: Verify tag commit is on main
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag commit ancestry
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  # Build Python wheels for multiple platforms (abi3 for all Python 3.12+)
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, release_guard]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: universal2-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Update version in Cargo.toml
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          cat Cargo.toml | head -5

      - name: Update version in pyproject.toml
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          cat pyproject.toml | head -10

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features python
          sccache: "true"
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  # Build source distribution
  sdist:
    name: Build source distribution
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, release_guard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update version in Cargo.toml
        if: startsWith(github.ref, 'refs/tags/v')
        run: sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Update version in pyproject.toml
        if: startsWith(github.ref, 'refs/tags/v')
        run: sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish_crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, release_guard]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --allow-dirty

  # Publish to PyPI
  publish_pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_wheels, sdist]
    environment: production
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
